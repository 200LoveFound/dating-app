{% extends "authenticated-base.html" %}

{% block additional_styles %}
<style>
.theme-female {
    background: linear-gradient(135deg, #e67ed0, #fdfeff, #fcb0eb, #fdfeff);
}

.theme-male {
    background: linear-gradient(135deg, #52a0ff, #fdfeff, hsl(213, 83%, 68%), #fdfeff);
}

.form-card {
    max-width: 600px;
    margin: 0 auto;
    border-radius: 1rem;
    overflow: hidden;
}

.btn-save {
    background: #E1F5EE;
    color: #0F6E56;
    border: 0.5px solid #5DCAA5;
}

.btn-save:hover {
    background: #c9f0e4;
}

.btn-cancel {
    background: rgba(255, 255, 255, 0.7);
    border: none;
}


#sidebar {
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
    color: #000;
    border-right: 1px solid rgba(255, 255, 255, 0.3);
}

#sidebar .nav-link {
    background: rgba(255, 255, 255, 0.4);
    color: #72243E;
    border-radius: 0.5rem;
    border: none;
}

#sidebar .nav-link:hover {
    background: rgba(255, 255, 255, 0.7);
    color: #4B1528;
}



</style>
{% endblock %}

{% block subpage_content %}

<body class="{% if mine.gender == 'female' %}theme-female{% elif mine.gender == 'male' %}theme-male{% endif %}">

<div class="container py-4">

    <h3 class="mb-3 text-center">✏ Edit My Profile</h3>
    <p class="text-muted text-center">Update your profile details below.</p>

    <div class="card form-card shadow-sm p-4">

        <form method="POST" action="/my_profile/edit">

            <div class="mb-3">
                <label class="form-label"><strong>Username</strong></label>
                <input type="text" name="username" value="{{ mine.username }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Age</strong></label>
                <input type="text" name="age" value="{{ mine.age }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Bio</strong></label>
                <textarea name="bio" class="form-control" rows="4" required>{{ mine.bio }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Preferred Gender</strong></label>
                <select name="preferred_gender" class="form-select" required>
                    <option value="any" {% if mine.preferred_gender == "any" %}selected{% endif %}>Any</option>
                    <option value="male" {% if mine.preferred_gender == "male" %}selected{% endif %}>Male</option>
                    <option value="female" {% if mine.preferred_gender == "female" %}selected{% endif %}>Female</option>
                </select>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-save w-100">💾 Save Changes</button>
                <a href="/my_profile" class="btn btn-cancel w-100">❌ Cancel</a>
            </div>

        </form>

    </div>

</div>

</body>

{% endblock %}
