{% extends "authenticated-base.html" %}

{% block external_js %}
<script src="{{ url_for('static', path='js/app.js')}}"></script>
{% endblock %}

{% block additional_styles %}
<style>
body{
    background: linear-gradient(135deg, #52a0ff, #fdfeff, hsl(213, 83%, 68%), #fdfeff );
}

#sidebar {
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
    color: #000;
    border-right: 1px solid rgba(255, 255, 255, 0.3);
}

#sidebar .nav-link {
    background: rgba(255, 255, 255, 0.4);
    color: #72243E;
    border-radius: 0.5rem;
    border: none;
}

#sidebar .nav-link:hover {
    background: rgba(255, 255, 255, 0.7);
    color: #4B1528;
}

.profile-card {
    max-width: 320px;
    flex-shrink: 0;
    margin: 0 auto;
    border-radius: 1rem;
}

.profile-card-img {
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 1rem 1rem 0 0;
    background: rgba(255,255,255,0.35);
}

.profile-initials {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 500;
    color: white;
    background: rgba(0,0,0,0.2);
}

.profile-name { font-size: 16px; font-weight: 600; }
.profile-age  { font-size: 13px; }
.profile-bio  { font-size: 12px; line-height: 1.5; }

.report-meta {
    font-size: 12px;
    color: #666;
    margin-bottom: 0.5rem;
}

.report-reason-box {
    background: #fff5f5;
    border: 1px solid #f1b0b7;
    border-radius: 0.75rem;
    padding: 0.75rem;
    font-size: 13px;
    color: #842029;
    min-height: 90px;
}

.btn-block-user {
    background: #FCEBEB;
    color: #A32D2D;
    border: 0.5px solid #F09595;
}

.btn-ignore-report {
    background: #E1F5EE;
    color: #0F6E56;
    border: 0.5px solid #5DCAA5;
}
</style>
{% endblock %}

{% block subpage_content %}
<div class="container py-4">
    <div class="card shadow-sm mx-auto" style="max-width: 600px; border-radius: 1rem;">
        <div class="card-body p-4">
            <h2 class="mb-3">Report Profile</h2>

            <p>
                You are reporting:
                <strong>{{ profiletoreport.username }}</strong>
            </p>

            <form method="POST" action="/report/{{ profiletoreport.id }}">
                <div class="mb-3">
                    <label for="reason" class="form-label">Reason for report</label>
                    <textarea name="reason" class="form-control" id="reason"  rows="5" placeholder="Please provide a short reason for reporting this account" required></textarea>
                </div>

                <div class="d-flex gap-2">
                    <a href="/app" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-danger">Submit Report</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
